name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]
        typescript-version: ['~5.0', 'latest']
    name: Node ${{ matrix.node-version }} / TS ${{ matrix.typescript-version }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm ci
      - run: npm install typescript@${{ matrix.typescript-version }}
      - run: npm run build
      - run: npm test
